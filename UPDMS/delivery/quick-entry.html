<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Entry/Exit Control</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/globals.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="../assets/js/firebase.js"></script>
  <script src="../assets/js/database.js"></script>
  <script>
    let currentMode = 'entry';
    let entrySubMode = 'qr';
    let exitSubMode = 'qr';
    let html5Qrcode = null;
    let html5QrcodeExit = null;
    
    async function init() {
      await initFirebase();
      loadInside();
      if (currentMode === 'entry') initEntryScanner();
    }
    
    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      
      document.getElementById('panel-entry').classList.add('hidden');
      document.getElementById('panel-exit').classList.add('hidden');
      document.getElementById('panel-anpr').classList.add('hidden');
      
      if (mode === 'entry') {
        document.getElementById('panel-entry').classList.remove('hidden');
        initEntryScanner();
      } else if (mode === 'exit') {
        document.getElementById('panel-exit').classList.remove('hidden');
        initExitScanner();
      } else {
        document.getElementById('panel-anpr').classList.remove('hidden');
      }
    }
    
    function setEntryMode(mode) {
      entrySubMode = mode;
      document.querySelectorAll('#panel-entry .mode-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('entry-qr').classList.toggle('hidden', mode !== 'qr');
      document.getElementById('entry-plate').classList.toggle('hidden', mode !== 'plate');
    }
    
    function setExitMode(mode) {
      exitSubMode = mode;
      document.querySelectorAll('#panel-exit .mode-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('exit-qr').classList.toggle('hidden', mode !== 'qr');
      document.getElementById('exit-plate').classList.toggle('hidden', mode !== 'plate');
    }
    
    function initEntryScanner() {
      try {
        if (!html5Qrcode && document.getElementById('qr-reader')) {
          html5Qrcode = new Html5Qrcode("qr-reader");
          html5Qrcode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, onEntryScan, () => {}).catch(() => {});
        }
      } catch(e) { console.log('Scanner error:', e); }
    }
    
    function initExitScanner() {
      try {
        if (!html5QrcodeExit && document.getElementById('qr-reader-exit')) {
          html5QrcodeExit = new Html5Qrcode("qr-reader-exit");
          html5QrcodeExit.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, onExitScan, () => {}).catch(() => {});
        }
      } catch(e) { console.log('Scanner error:', e); }
    }
    
    function onEntryScan(code) { processEntryCode(code); }
    function onExitScan(code) { processExitCode(code); }
    
    async function processEntry() {
      const plate = document.getElementById('entryPlateInput').value.trim().toUpperCase();
      if (!plate) return toast('Enter plate number');
      document.getElementById('entryPlateInput').value = '';
      await processEntryCode('DEL-' + plate);
    }
    
    async function processExit() {
      const plate = document.getElementById('exitPlateInput').value.trim().toUpperCase();
      if (!plate) return toast('Enter plate number');
      document.getElementById('exitPlateInput').value = '';
      await processExitCode('DEL-' + plate);
    }
    
    async function processEntryCode(code) {
      const plate = code.replace('DEL-', '').replace('FREQ-', '').trim().toUpperCase();
      
      const vehicle = await UPS_DB.checkVehicle(plate);
      if (vehicle) {
        await UPS_DB.recordEntry({ vehiclePlate: plate, qrCode: code, type: 'vehicle', name: vehicle.company || vehicle.driver_name });
        showResult('entry', 'success', '<i class="fas fa-check-circle"></i> ENTRY GRANTED', `${vehicle.company || vehicle.driver_name}<br>${plate}`);
        loadInside();
        return;
      }
      
      const visitor = await UPS_DB.checkVisitor(plate);
      if (visitor) {
        await UPS_DB.recordEntry({ qrCode: code, visitorName: visitor.full_name, type: 'person', name: visitor.full_name });
        showResult('entry', 'success', '<i class="fas fa-check-circle"></i> WELCOME', `${visitor.full_name}<br>Visiting: ${visitor.visits_for}`);
        loadInside();
        return;
      }
      
      showResult('entry', 'error', '<i class="fas fa-times-circle"></i> ACCESS DENIED', 'Not registered or outside schedule');
    }
    
    async function processExitCode(code) {
      const plate = code.replace('DEL-', '').replace('FREQ-', '').trim().toUpperCase();
      const result = await UPS_DB.recordExit(plate);
      
      if (result) {
        showResult('exit', 'success', '<i class="fas fa-check-circle"></i> Signed Out', 'Goodbye!');
        loadInside();
      } else {
        showResult('exit', 'error', '<i class="fas fa-times-circle"></i> Error', 'No active entry found');
      }
    }
    
    async function simulateANPR() {
      const plate = document.getElementById('anprInput').value.trim().toUpperCase();
      if (!plate) return toast('Enter plate to detect');
      document.getElementById('anprInput').value = '';
      
      const vehicle = await UPS_DB.checkVehicle(plate);
      const resultBox = document.getElementById('anpr-result');
      
      if (vehicle) {
        await UPS_DB.recordEntry({ vehiclePlate: plate, type: 'ANPR', name: vehicle.company || vehicle.driver_name });
        resultBox.className = 'result-box show success';
        resultBox.innerHTML = `<strong>GRANTED</strong><br>${plate}<br>${vehicle.company || ''}`;
        loadInside();
      } else {
        resultBox.className = 'result-box show error';
        resultBox.innerHTML = `<strong>DENIED</strong><br>${plate}<br>Not in whitelist`;
      }
    }
    
    function showResult(type, cls, title, msg) {
      const box = document.getElementById(type + '-result');
      box.className = 'result-box show ' + cls;
      box.innerHTML = `<strong>${title}</strong><br>${msg}`;
      setTimeout(() => box.classList.remove('show'), 5000);
    }
    
    async function loadInside() {
      const deliveries = await UPS_DB.getActiveDeliveries();
      const list = document.getElementById('insideList');
      list.innerHTML = deliveries.map(d => `
        <div class="inside-item">
          <div>
            <div class="plate">${d.vehiclePlate || d.visitorName || d.qrCode || 'Unknown'}</div>
            <div class="time">In: ${d.entryTime ? new Date(d.entryTime).toLocaleTimeString() : 'N/A'}</div>
          </div>
          <button class="exit-btn" onclick="quickExit('${d.vehiclePlate || d.qrCode}')">Out</button>
        </div>
      `).join('') || '<p style="color:#999;text-align:center;">No one inside</p>';
      document.getElementById('insideCount').textContent = deliveries.length;
    }
    
    async function quickExit(code) {
      await UPS_DB.recordExit(code);
      loadInside();
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      init();
      setInterval(loadInside, 10000);
    });
  </script>
</body>
</html>
