<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Vehicle & Visitor Registration</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/globals.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase.js"></script>
  <script src="../assets/js/database.js"></script>
  <script>
    async function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
      event.target.classList.add('active');
      document.getElementById('tab-' + tab).classList.remove('hidden');
    }
    
    async function loadData() {
      // Initialize Firebase first
      await initFirebase();
      
      const vehicles = await UPS_DB.getVehicles();
      document.getElementById('vehicleList').innerHTML = vehicles.map(v => `
        <div class="item-card">
          <div class="item-plate">${v.vehicle_plate}</div>
          <div class="item-name"><i class="fas fa-building"></i> ${v.company}</div>
          <div class="item-detail">${v.driver_name} | ${v.vehicle_type}</div>
          <div class="item-qr">${v.qr_code || 'DEL-' + v.vehicle_plate}</div>
        </div>
      `).join('') || '<p style="color:#999;font-size:0.85rem;">No vehicles registered</p>';
        
      const visitors = await UPS_DB.getVisitors();
      document.getElementById('visitorList').innerHTML = visitors.map(v => `
        <div class="item-card">
          <div class="item-plate">${v.full_name}</div>
          <div class="item-name">Visiting: ${v.visits_for}</div>
          <div class="item-detail">${v.organization || 'Individual'} | ${v.frequency}</div>
          <div class="item-qr">${v.qr_code || 'FREQ-' + (v.full_name || '').substring(0,8)}</div>
        </div>
      `).join('') || '<p style="color:#999;font-size:0.85rem;">No frequent visitors</p>';
    }
    
    async function registerVehicle() {
      const company = document.getElementById('v-company').value.trim();
      const plate = document.getElementById('v-plate').value.trim().toUpperCase();
      const driverName = document.getElementById('v-driver').value.trim();
      const driverPhone = document.getElementById('v-phone').value.trim();
      const vehicleType = document.getElementById('v-type').value;
      const frequency = document.getElementById('v-frequency').value;
      const start = document.getElementById('v-start').value;
      const end = document.getElementById('v-end').value;
      
      const daysSelect = document.getElementById('v-days');
      const allowedDays = Array.from(daysSelect.selectedOptions).map(o => o.value).join(',');
      
      if (!company || !plate || !driverName || !driverPhone) {
        return toast('Please fill in required fields');
      }
      
      const vehicle = {
        company,
        vehicle_plate: plate,
        driver_name: driverName,
        driver_phone: driverPhone,
        vehicle_type: vehicleType,
        frequency,
        allowed_days: allowedDays,
        allowed_hours_start: start,
        allowed_hours_end: end,
        qr_code: 'DEL-' + plate
      };
      
      await UPS_DB.addVehicle(vehicle);
      toast('Vehicle registered!');
      loadData();
    }
    
    async function registerVisitor() {
      const fullName = document.getElementById('f-name').value.trim();
      const idNumber = document.getElementById('f-id').value.trim();
      const phone = document.getElementById('f-phone').value.trim();
      const organization = document.getElementById('f-org').value.trim();
      const visitsFor = document.getElementById('f-visiting').value.trim();
      const frequency = document.getElementById('f-frequency').value;
      const plate = document.getElementById('f-plate').value.trim();
      const start = document.getElementById('f-start').value;
      const end = document.getElementById('f-end').value;
      
      if (!fullName || !phone || !visitsFor) {
        return toast('Please fill in required fields');
      }
      
      const visitor = {
        full_name: fullName,
        id_number: idNumber,
        phone,
        organization,
        visits_for: visitsFor,
        frequency,
        vehicle_plate: plate,
        allowed_hours_start: start,
        allowed_hours_end: end,
        qr_code: 'FREQ-' + fullName.replace(/\s/g, '').substring(0, 8).toUpperCase()
      };
      
      await UPS_DB.addVisitor(visitor);
      toast('Visitor registered!');
      loadData();
    }
    
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
