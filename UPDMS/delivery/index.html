<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Vehicle & Visitor Registration</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/globals.css">
  <style>
    body { background: var(--prison-light); padding: 0; }
    .page-header { background: var(--prison-maroon); color: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
    .page-header h1 { color: var(--prison-gold); font-size: 1.2rem; margin: 0; }
    
    .tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; }
    .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: 600; border-bottom: 3px solid transparent; }
    .tab:hover { background: #f5f5f5; }
    .tab.active { border-bottom-color: var(--prison-maroon); color: var(--prison-maroon); }
    
    .main-layout { display: flex; min-height: calc(100vh - 120px); }
    .content-area { flex: 1; padding: 25px; }
    .side-panel { width: 380px; background: rgba(128,0,0,0.08); padding: 20px; border-left: 1px solid rgba(255,215,0,0.2); overflow-y: auto; max-height: calc(100vh - 120px); }
    .side-panel h3 { color: var(--prison-gold); margin-bottom: 12px; font-size: 0.95rem; }
    
    .form-card { background: #fff; padding: 25px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-weight: 700; margin-bottom: 4px; color: var(--prison-maroon-dark); font-size: 0.9rem; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #eee; border-radius: var(--radius-sm); }
    .form-group input:focus { border-color: var(--prison-maroon); outline: none; }
    
    .item-card { background: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--prison-gold); }
    .item-plate { font-weight: 700; color: var(--prison-maroon); font-family: monospace; font-size: 1rem; }
    .item-name { font-size: 0.85rem; color: #666; }
    .item-detail { font-size: 0.75rem; color: #888; }
    .item-qr { background: var(--prison-maroon); color: var(--prison-gold); padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 0.7rem; display: inline-block; margin-top: 5px; }
    
    .hidden { display: none; }
  </style>
</head>
<body>
  <header class="page-header">
    <div style="display: flex; align-items: center; gap: 12px;">
      <img src="../uganda_prisons_first_%20screen/ups-logo.png" alt="UPS" style="height: 35px;">
      <h1>VEHICLE & VISITOR PASS</h1>
    </div>
    <a href="../uganda_prisons_first_%20screen/index.html" class="btn btn-primary" style="padding: 6px 12px; font-size: 0.85rem;">
      <i class="fas fa-home"></i> Home
    </a>
  </header>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('vehicle')"><i class="fas fa-car"></i> Vehicle (Car/Moto)</div>
    <div class="tab" onclick="switchTab('visitor')"><i class="fas fa-user"></i> Frequent Visitor</div>
  </div>
  
  <div class="main-layout">
    <div class="content-area">
      <!-- Vehicle Registration -->
      <div id="tab-vehicle" class="tab-content">
        <div class="form-card">
          <h3 style="margin: 0 0 15px 0; color: var(--prison-maroon);">Register Vehicle</h3>
          
          <div class="form-group">
            <label>Company / Organization *</label>
            <input type="text" id="v-company" placeholder="e.g. Uganda Post, Supplier Ltd">
          </div>
          
          <div class="form-group">
            <label>Vehicle Type *</label>
            <select id="v-type">
              <option value="car">Car</option>
              <option value="motorcycle">Motorcycle/Boda Boda</option>
              <option value="truck">Truck/Lorry</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Plate Number *</label>
            <input type="text" id="v-plate" placeholder="e.g. UAA 123X or UG 1234R" style="text-transform: uppercase;">
          </div>
          
          <div class="form-group">
            <label>Driver Name *</label>
            <input type="text" id="v-driver" placeholder="Driver's full name">
          </div>
          
          <div class="form-group">
            <label>Driver Phone *</label>
            <input type="tel" id="v-phone" placeholder="+256 7XX XXX XXX">
          </div>
          
          <div class="form-group">
            <label>Delivery Frequency</label>
            <select id="v-frequency">
              <option value="daily">Daily</option>
              <option value="weekly" selected>Weekly</option>
              <option value="monthly">Monthly</option>
              <option value="occasional">Occasional</option>
            </select>
          </div>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group">
              <label>Start Time</label>
              <input type="time" id="v-start" value="06:00">
            </div>
            <div class="form-group">
              <label>End Time</label>
              <input type="time" id="v-end" value="18:00">
            </div>
          </div>
          
          <div class="form-group">
            <label>Allowed Days</label>
            <select id="v-days" multiple style="height: 80px;">
              <option value="0">Sunday</option>
              <option value="1" selected>Monday</option>
              <option value="2" selected>Tuesday</option>
              <option value="3" selected>Wednesday</option>
              <option value="4" selected>Thursday</option>
              <option value="5" selected>Friday</option>
              <option value="6">Saturday</option>
            </select>
          </div>
          
          <button class="btn btn-maroon" style="width: 100%; margin-top: 10px;" onclick="registerVehicle()">
            <i class="fas fa-save"></i> Register Vehicle
          </button>
        </div>
      </div>
      
      <!-- Frequent Visitor Registration -->
      <div id="tab-visitor" class="tab-content hidden">
        <div class="form-card">
          <h3 style="margin: 0 0 15px 0; color: var(--prison-maroon);">Register Frequent Visitor</h3>
          
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="f-name" placeholder="Visitor's full name">
          </div>
          
          <div class="form-group">
            <label>National ID Number</label>
            <input type="text" id="f-id" placeholder="CM9010001234">
          </div>
          
          <div class="form-group">
            <label>Phone Number *</label>
            <input type="tel" id="f-phone" placeholder="+256 7XX XXX XXX">
          </div>
          
          <div class="form-group">
            <label>Organization</label>
            <input type="text" id="f-org" placeholder="Company or department">
          </div>
          
          <div class="form-group">
            <label>Visiting (Staff/Inmate Name) *</label>
            <input type="text" id="f-visiting" placeholder="Who are they visiting?">
          </div>
          
          <div class="form-group">
            <label>Frequency</label>
            <select id="f-frequency">
              <option value="daily">Daily</option>
              <option value="weekly" selected>Weekly</option>
              <option value="monthly">Monthly</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Vehicle Plate (if any)</label>
            <input type="text" id="f-plate" placeholder="Optional - for vehicle tracking" style="text-transform: uppercase;">
          </div>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group">
              <label>Start Time</label>
              <input type="time" id="f-start" value="08:00">
            </div>
            <div class="form-group">
              <label>End Time</label>
              <input type="time" id="f-end" value="17:00">
            </div>
          </div>
          
          <button class="btn btn-maroon" style="width: 100%; margin-top: 10px;" onclick="registerVisitor()">
            <i class="fas fa-save"></i> Register Visitor
          </button>
        </div>
      </div>
    </div>
    
    <!-- Side Panel -->
    <div class="side-panel">
      <h3><i class="fas fa-car"></i> Registered Vehicles</h3>
      <div id="vehicleList"></div>
      
      <h3 style="margin-top: 20px;"><i class="fas fa-user"></i> Frequent Visitors</h3>
      <div id="visitorList"></div>
    </div>
  </div>
  
  <script src="../assets/js/app-core.js"></script>
  <script>
    const API = 'api.php';
    
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
      event.target.classList.add('active');
      document.getElementById('tab-' + tab).classList.remove('hidden');
    }
    
    function loadData() {
      fetch(API + '?action=list_vehicles')
        .then(r => r.json())
        .then(data => {
          document.getElementById('vehicleList').innerHTML = data.vehicles.map(v => `
            <div class="item-card">
              <div class="item-plate">${v.vehicle_plate}</div>
              <div class="item-name"><i class="fas fa-building"></i> ${v.company}</div>
              <div class="item-detail">${v.driver_name} | ${v.vehicle_type}</div>
              <div class="item-qr">${v.qr_code}</div>
            </div>
          `).join('') || '<p style="color:#999;font-size:0.85rem;">No vehicles registered</p>';
        });
        
      fetch(API + '?action=list_visitors')
        .then(r => r.json())
        .then(data => {
          document.getElementById('visitorList').innerHTML = data.visitors.map(v => `
            <div class="item-card">
              <div class="item-plate">${v.full_name}</div>
              <div class="item-name">Visiting: ${v.visits_for}</div>
              <div class="item-detail">${v.organization || 'Individual'} | ${v.frequency}</div>
              <div class="item-qr">${v.qr_code}</div>
            </div>
          `).join('') || '<p style="color:#999;font-size:0.85rem;">No frequent visitors</p>';
        });
    }
    
    function registerVehicle() {
      const company = document.getElementById('v-company').value.trim();
      const plate = document.getElementById('v-plate').value.trim().toUpperCase();
      const driver = document.getElementById('v-driver').value.trim();
      const phone = document.getElementById('v-phone').value.trim();
      const vtype = document.getElementById('v-type').value;
      const freq = document.getElementById('v-frequency').value;
      const start = document.getElementById('v-start').value;
      const end = document.getElementById('v-end').value;
      
      const daysSelect = document.getElementById('v-days');
      const days = Array.from(daysSelect.selectedOptions).map(o => o.value).join(',');
      
      if (!company || !plate || !driver || !phone) {
        return toast('Please fill in required fields');
      }
      
      fetch(API + '?action=register_vehicle', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          company, vehicle_plate: plate, driver_name: driver, 
          driver_phone: phone, vehicle_type: vtype, frequency: freq,
          allowed_days: days, allowed_hours_start: start, allowed_hours_end: end
        })
      }).then(r => r.json()).then(data => {
        toast(data.success ? 'Vehicle registered!' : data.error);
        if (data.success) loadData();
      });
    }
    
    function registerVisitor() {
      const name = document.getElementById('f-name').value.trim();
      const id = document.getElementById('f-id').value.trim();
      const phone = document.getElementById('f-phone').value.trim();
      const org = document.getElementById('f-org').value.trim();
      const visits = document.getElementById('f-visiting').value.trim();
      const freq = document.getElementById('f-frequency').value;
      const plate = document.getElementById('f-plate').value.trim();
      const start = document.getElementById('f-start').value;
      const end = document.getElementById('f-end').value;
      
      if (!name || !phone || !visits) {
        return toast('Please fill in required fields');
      }
      
      fetch(API + '?action=register_visitor', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          full_name: name, id_number: id, phone, organization: org,
          visits_for: visits, frequency: freq, vehicle_plate: plate,
          allowed_hours_start: start, allowed_hours_end: end
        })
      }).then(r => r.json()).then(data => {
        toast(data.success ? 'Visitor registered!' : data.error);
        if (data.success) loadData();
      });
    }
    
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
