<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>UPS — Official Visits</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/globals.css">
  <script src="../assets/js/registration.js"></script>
  <style>
    body { background: var(--prison-light); padding: 0; }
    .page-header { background: var(--prison-maroon); color: #fff; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-md); }
    .page-header h1 { color: var(--prison-gold); font-size: 1.5rem; margin: 0; }
    
    .main-layout { display: flex; min-height: calc(100vh - 90px); }
    .content-area { flex: 1; padding: 40px 5%; max-width: 1000px; margin: 0 auto; }
    .side-panel { width: 300px; background: rgba(128,0,0,0.1); padding: 20px; border-left: 1px solid rgba(255,215,0,0.2); }
    .side-panel h3 { color: var(--prison-gold); margin-bottom: 15px; font-size: 1rem; }
    
    .form-container { background: #fff; padding: 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--prison-maroon-dark); }
    .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: var(--radius-sm); font-family: var(--font-body); }
  </style>
</head>
<body>

<header class="page-header">
  <div style="display: flex; align-items: center; gap: 15px;">
    <img src="../uganda_prisons_first_%20screen/ups-logo.png" alt="UPS" style="height: 50px;">
    <h1>OFFICIAL VISITS</h1>
  </div>
  <div style="display: flex; align-items: center; gap: 20px;">
    <div id="liveClock" class="text-gold" style="font-weight: 700;"></div>
    <a href="../uganda_prisons_first_%20screen/index.html" class="btn btn-primary" style="padding: 8px 16px;">
      <i class="fas fa-home"></i> Home
    </a>
  </div>
</header>

<main class="main-layout">
  <div class="content-area">
    <div class="form-container">
      <h2 style="margin-bottom: 30px; text-align: center;">Official Visitor Registration</h2>
      
      <div class="form-group">
        <label>Organization / Department *</label>
        <input type="text" id="orgName" placeholder="e.g. Ministry of Internal Affairs">
      </div>

      <div class="form-group">
        <label>Visitor Full Name *</label>
        <input type="text" id="visitorName" placeholder="e.g. John Mukasa">
      </div>

      <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" id="visitorPhone" placeholder="+256 7XX XXX XXX">
      </div>

      <div class="form-group">
        <label>Vehicle Number Plate</label>
        <input type="text" id="vehiclePlate" placeholder="e.g. UAA 123X">
      </div>

      <div class="form-group">
        <label>Department to Visit *</label>
        <select id="department">
          <option value="">Select Department</option>
          <option>Administration</option>
          <option>Security</option>
          <option>Finance</option>
          <option>Legal</option>
          <option>Medical</option>
          <option>Registry</option>
        </select>
      </div>

      <div class="form-group">
        <label>Purpose of Visit *</label>
        <select id="purpose">
          <option value="">Select Purpose</option>
          <option>Official Meeting</option>
          <option>Audit/Inspection</option>
          <option>Delivery</option>
          <option>Procurement</option>
        </select>
      </div>

      <button class="btn btn-maroon" style="width: 100%; margin-top: 20px;" onclick="registerVisitor()">
        <i class="fas fa-briefcase"></i> Register Official Visit
      </button>
    </div>
  </div>
  
  <div class="side-panel">
    <h3><i class="fas fa-users"></i> Active Visits</h3>
    <div id="active-panel"></div>
  </div>
</main>

<script src="../assets/js/app-core.js"></script>
<script src="../assets/js/registration.js"></script>
<script>
  function registerVisitor() {
    const org = document.getElementById('orgName').value.trim();
    const name = document.getElementById('visitorName').value.trim();
    const phone = document.getElementById('visitorPhone').value.trim();
    const dept = document.getElementById('department').value;
    
    if (!org || !name || !phone || !dept) {
      return toast('⚠️ Please fill in all required fields.');
    }
    
    const ref = 'OFF-' + new Date().getFullYear() + String(new Date().getMonth()+1).padStart(2,'0') + String(new Date().getDate()).padStart(2,'0') + '-' + Math.floor(Math.random()*9000+1000);
    
    UPS_REG.signIn({ ref, name, phone, module: 'official', destination: dept });
    renderActivePanel('active-panel');
    
    toast('✅ Official visit registered. Proceed to front desk.');
    setTimeout(() => {
      window.location.href = '../uganda_prisons_first_%20screen/index.html';
    }, 2500);
  }
  
  document.addEventListener('DOMContentLoaded', () => renderActivePanel('active-panel'));
</script>
</body>
</html>
